<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDCare Digital Pro - Smart Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* আপনার সাইটের মূল থিম কালার */
        :root {
            --primary: #1a56db;
            --dark: #111827;
            --light: #f3f4f6;
            --white: #ffffff;
        }

        body { font-family: 'Hind Siliguri', sans-serif; background: var(--light); padding: 20px; }
        .dashboard-card { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 900px; margin: auto; }
        .upload-box { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--primary); background: #f8fafc; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .result-area { margin-top: 20px; display: none; }
        .result-area.active { display: block; }
        textarea { width: 100%; border-radius: 10px; border: 1px solid #ddd; padding: 15px; background: #fafafa; }
        
        /* Loading Overlay */
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; color: white; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #fff; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p class="mt-3">স্ক্যান হচ্ছে... দয়া করে অপেক্ষা করুন</p>
</div>

<div class="dashboard-card">
    <h2 class="text-center mb-4" style="color: var(--primary);"><i class="fas fa-id-card"></i> IDCare Digital Pro Scanner</h2>
    
    <div class="upload-box" id="dropZone">
        <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: var(--primary);"></i>
        <h4>আইডি কার্ডের ছবি এখানে দিন</h4>
        <p class="text-muted">Drag & Drop or Click to Upload</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div class="result-area" id="resultBox">
        <h5 class="mt-4 mb-2">স্ক্যান করা তথ্য:</h5>
        <textarea id="output" rows="10"></textarea>
        
        <div class="d-flex gap-2 mt-3">
            <button class="btn-primary" onclick="copyText()"><i class="fas fa-copy"></i> কপি করুন</button>
            <button class="btn-primary" style="background: #10b981;" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> এক্সেল ডাউনলোড</button>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const output = document.getElementById('output');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('resultBox');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    };

    async function handleFile(file) {
        loader.style.display = 'flex';
        resultBox.classList.remove('active');

        try {
            // Tesseract Engine Setup (English + Bengali)
            const { data: { text } } = await Tesseract.recognize(file, 'eng+ben', {
                logger: m => console.log(m)
            });

            output.value = text;
            resultBox.classList.add('active');
            alert('✅ স্ক্যান সম্পন্ন হয়েছে!');
        } catch (err) {
            alert('❌ সমস্যা হয়েছে: ' + err.message);
        } finally {
            loader.style.display = 'none';
        }
    }

    function copyText() {
        output.select();
        document.execCommand('copy');
        alert('কপি করা হয়েছে!');
    }

    function downloadExcel() {
        const ws = XLSX.utils.aoa_to_sheet([["ID Card Information"], [output.value]]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "ScannedData");
        XLSX.writeFile(wb, "ID_Data_IDCare.xlsx");
    }
</script>

</body>
</html>
